<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-on-background selection:text-background">
<!-- Top App Bar (Suppressed on this transactional screen as per instructions, but adding a minimal brand anchor instead) -->
<header class="w-full flex justify-center items-center py-6 px-margin-mobile">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-on-background">EGLI’S CUT CLUB</h1>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-stack-lg max-w-container-max mx-auto w-full md:grid md:grid-cols-12 md:gap-gutter md:px-margin-desktop md:items-start">
<!-- Confirmation Content -->
<div class="w-full flex flex-col items-center text-center md:col-span-8 md:col-start-3 md:pt-16">
<!-- Success Icon -->
<div class="mb-stack-md animate-bounce" style="animation-iteration-count: 3;">
<span class="material-symbols-outlined text-[80px] text-on-background" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headline -->
<h2 class="font-display-xl-mobile text-display-xl-mobile md:font-display-xl md:text-display-xl mb-stack-sm text-balance">YOU'RE ALL SET.</h2>
<p class="font-label-caps text-label-caps text-on-surface-variant bg-caravan-cream px-4 py-2 rounded-none border border-deep-walnut/10 mb-stack-lg uppercase tracking-widest inline-block">SCREENSHOT THIS.</p>
<!-- Summary Card -->
<div class="w-full max-w-md bg-caravan-cream border-2 border-on-background p-6 md:p-8 flex flex-col gap-stack-md text-left relative shadow-[4px_4px_0_0_rgba(27,28,28,1)]" id="receipt-card">
<!-- Ticket Header -->
<div class="flex justify-between items-end border-b-2 border-on-background/20 pb-4">
<div>
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">CLIENT</span>
<span class="font-subheading text-subheading text-on-background uppercase">John Doe</span>
</div>
<div class="text-right">
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">ID</span>
<span class="font-label-caps text-label-caps text-on-background">#ECC-8942</span>
</div>
</div>
<!-- Ticket Details -->
<div class="grid grid-cols-2 gap-y-6 py-2">
<div>
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">LOCATION</span>
<span class="font-body-md text-body-md text-on-background uppercase">Saranda Caravan</span>
</div>
<div>
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">SERVICE</span>
<span class="font-body-md text-body-md text-on-background uppercase">Full Reset</span>
</div>
<div>
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">DATE</span>
<span class="font-body-md text-body-md text-on-background uppercase">Tue, Jul 15</span>
</div>
<div>
<span class="block font-label-caps text-label-caps text-on-surface-variant mb-1">TIME</span>
<span class="font-body-md text-body-md text-on-background uppercase">6:40 PM</span>
</div>
</div>
<!-- Ticket Footer (Price) -->
<div class="border-t-2 border-on-background/20 pt-4 flex justify-between items-center">
<span class="font-label-caps text-label-caps text-on-surface-variant">DUE AT SHOP</span>
<span class="font-subheading text-subheading text-on-background">1,500 ALL</span>
</div>
<!-- Salty Divider overlay aesthetic -->
<div class="absolute -left-2 top-1/2 w-4 h-8 bg-background border-r-2 border-on-background rounded-r-full border-t-2 border-b-2"></div>
<div class="absolute -right-2 top-1/2 w-4 h-8 bg-background border-l-2 border-on-background rounded-l-full border-t-2 border-b-2 shadow-[-4px_0_0_0_rgba(27,28,28,1)]"></div>
</div>
<!-- Notice -->
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-md max-w-sm text-balance">Payment is completed at the shop. No online payment needed.</p>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-4 mt-stack-lg w-full max-w-md justify-center">
<button class="font-button text-button bg-transparent border-2 border-on-background text-on-background px-6 py-4 uppercase w-full sm:w-auto hover:bg-on-background hover:text-background transition-colors duration-200">
                    Cancel Reservation
                </button>
<button class="font-button text-button bg-on-background text-caravan-cream px-6 py-4 uppercase w-full sm:w-auto hover:bg-deep-walnut transition-colors duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="phone">phone</span>
                    Call for Assistance
                </button>
</div>
<div class="mt-section-gap w-full text-center">
<a class="font-label-caps text-label-caps text-on-surface-variant hover:text-burnt-earth transition-colors underline underline-offset-4" href="#">RETURN TO HOME</a>
</div>
</div>
</main>
<!-- Navigation Suppressed for this transactional screen -->
</body></html>
